<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Puzzle Game</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <!-- Menu Page -->
    <div id="menu" class="page">
        <h1>Puzzle Games</h1>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="startGame('15puzzle')">15 Puzzle</button>
            <button class="menu-btn" onclick="startGame('memory')">Memory Tiles</button>
        </div>
    </div>

    <!-- 15 Puzzle Page -->
    <div id="15puzzle" class="page hidden">
        <button class="back-btn" onclick="goMenu()">← Menu</button>
        <h1>15 Puzzle</h1>
        <p>Slide tiles to order the numbers from 1 to 15.</p>

        <div class="status">
            <div>Moves: <span id="moves">0</span></div>
            <div>Time: <span id="timer">00:00</span></div>
        </div>

        <div id="puzzle" class="puzzle"></div>

        <div class="controls">
            <button id="shuffleBtn">Shuffle</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <!-- Memory Tiles Page -->
    <div id="memory" class="page hidden">
        <button class="back-btn" onclick="goMenu()">← Menu</button>
        <h1>Memory Tiles</h1>
        <p>Match pairs of numbers.</p>

        <div class="status">
            <div>Moves: <span id="mem-moves">0</span></div>
            <div>Time: <span id="mem-timer">00:00</span></div>
        </div>

        <div id="memory-grid" class="memory-grid"></div>

        <div class="controls">
            <button id="memResetBtn">Reset</button>
        </div>
    </div>

    <script src="Script.js"></script>
</body>
</html>
